<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>p5 + ComfyUI</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <main id="app">
      <!-- CANVAS -->
      <div id="sketch-container"></div>

      <!-- PROMPT LEFT -->
      <div class="prompt-ui">
        <input id="prompt" type="text" placeholder="Prompt..." />
      </div>

      <!-- CONTROLS RIGHT -->
      <div class="ui">
        <label id="loop-toggle" for="loop-realtime">
          <input id="loop-realtime" type="checkbox" />
          <span>Loop</span>
        </label>

        <button id="shuffle-seed" type="button">🎲</button>

        <select id="workflow-select" class="select"></select>
      </div>
    </main>

    <div class="status" id="status">idle</div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
